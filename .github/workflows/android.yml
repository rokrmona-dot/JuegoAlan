name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf automake libtool \
            pkg-config zlib1g-dev libncurses-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev build-essential ccache

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Crear buildozer.spec si no existe
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

          sed -i 's/title = .*/title = Servicio Social Ashlee/' buildozer.spec
          sed -i 's/package.name = .*/package.name = serviciosocialashlee/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.test/' buildozer.spec
          sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,jpeg,kv,atlas,ico/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's#icon.filename = .*#icon.filename = Icon.jpeg#' buildozer.spec
          sed -i 's/android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
          grep -q '^android.accept_sdk_license' buildozer.spec \
            && sed -i 's/android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec \
            || echo 'android.accept_sdk_license = True' >> buildozer.spec

      - name: Preparar SDK y aceptar licencias
        run: |
          buildozer android update

          SDKM="$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager"
          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"

          yes | "$SDKM" --sdk_root="$SDKROOT" --licenses || true
          yes | "$SDKM" --sdk_root="$SDKROOT" \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;37.0.0-rc2" || true

      - name: Compilar APK
        run: |
          buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
