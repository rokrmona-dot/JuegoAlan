name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull official Buildozer image
        run: docker pull ghcr.io/kivy/buildozer:latest

      - name: Build APK with official Buildozer Docker
        run: |
          mkdir -p "$HOME/.buildozer"
          docker run --rm \
            -v "$HOME/.buildozer:/home/user/.buildozer" \
            -v "$GITHUB_WORKSPACE:/home/user/hostcwd" \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Show bin folder
        run: ls -R bin || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
